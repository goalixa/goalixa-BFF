name: Build & Deploy BFF (Helm)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - staging
    paths-ignore:
      - '.github/**'
      - '**.md'
      - '.argo/**'
      - 'helm/**'
  pull_request:
    branches:
      - main
      - staging
    paths-ignore:
      - '.github/**'
      - '**.md'
      - '.argo/**'
      - 'helm/**'

permissions:
  contents: read
  actions: read

env:
  REGISTRY: harbor.goalixa.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image repository and deployment config
        id: config
        run: |
          # Determine environment based on branch
          # For PRs, use the base branch (target); for pushes, use ref
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BRANCH="${{ github.base_ref }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi

          if [[ "$BRANCH" == "staging" ]]; then
            # Staging deployment
            echo "repository=bff-staging/bff" >> $GITHUB_OUTPUT
            echo "image_tag=latest" >> $GITHUB_OUTPUT
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "app_name=goalixa-bff-staging" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "main" ]]; then
            # Production deployment
            echo "repository=goalixa-bff/bff" >> $GITHUB_OUTPUT
            echo "image_tag=latest" >> $GITHUB_OUTPUT
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "app_name=goalixa-bff" >> $GITHUB_OUTPUT
          else
            echo "Unsupported branch: $BRANCH"
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Debug Harbor credentials
        run: |
          echo "Username length: ${#HARBOR_USER}"
          echo "Username starts with: ${HARBOR_USER:0:10}"
          echo "Password length: ${#HARBOR_PASS}"
        env:
          HARBOR_USER: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASS: ${{ secrets.HARBOR_PASSWORD }}

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ steps.config.outputs.repository }}:latest"

          # Build using plain docker (no buildx)
          docker build --tag ${IMAGE} .

          # Push
          docker push ${IMAGE}

      - name: Setup kubectl
        run: |
          if [ -n "${{ secrets.KUBE_CONFIG }}" ]; then
            echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > /tmp/kubeconfig
            echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
            echo "HAS_KUBE_CONFIG=true" >> $GITHUB_ENV
          else
            echo "HAS_KUBE_CONFIG=false" >> $GITHUB_ENV
          fi

      - name: Update ArgoCD application
        if: env.HAS_KUBE_CONFIG == 'true'
        run: |
          IMAGE_TAG="${{ steps.config.outputs.image_tag }}"
          APP_NAME="${{ steps.config.outputs.app_name }}"
          ENVIRONMENT="${{ steps.config.outputs.environment }}"

          echo "Updating ArgoCD application '${APP_NAME}' (${ENVIRONMENT}) with image tag: ${IMAGE_TAG}"

          # Patch ArgoCD app with new Helm parameter
          kubectl patch application ${APP_NAME} \
            -n argocd \
            --type='merge' \
            -p="{
              \"spec\": {
                \"source\": {
                  \"helm\": {
                    \"parameters\": [
                      {
                        \"name\": \"image.tag\",
                        \"value\": \"${IMAGE_TAG}\"
                      }
                    ]
                  }
                }
              }
            }"

          # Trigger immediate sync
          kubectl annotate application ${APP_NAME} \
            -n argocd \
            "force-sync-at=$(date +%s)" \
            --overwrite

          echo "ArgoCD application '${APP_NAME}' updated for ${ENVIRONMENT}"

      - name: Summary
        run: |
          ENVIRONMENT="${{ steps.config.outputs.environment }}"
          IMAGE_TAG="${{ steps.config.outputs.image_tag }}"
          echo "## Build & Deploy Complete (${ENVIRONMENT})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** \`${ENVIRONMENT}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag:** \`${IMAGE_TAG}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Full Image:** \`${{ env.REGISTRY }}/${{ steps.config.outputs.repository }}:${IMAGE_TAG}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry:** \`${{ env.REGISTRY }}/${{ steps.config.outputs.repository }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **ArgoCD App:** \`${{ steps.config.outputs.app_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ env.HAS_KUBE_CONFIG }}" = "true" ]; then
            echo "- **Deployment Method:** Helm (ArgoCD - Auto-sync)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ArgoCD will now:" >> $GITHUB_STEP_SUMMARY
            echo "1. Detect Helm parameter change for \`${{ steps.config.outputs.app_name }}\`" >> $GITHUB_STEP_SUMMARY
            echo "2. Render Helm chart with image tag: \`${IMAGE_TAG}\`" >> $GITHUB_STEP_SUMMARY
            echo "3. Deploy to Kubernetes namespace: \`${ENVIRONMENT}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Deployment Method:** Helm (Manual sync required)" >> $GITHUB_STEP_SUMMARY
          fi
