apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: goalixa-bff
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app: goalixa-bff
    app.kubernetes.io/part-of: goalixa
    environment: production
spec:
  project: default
  source:
    repoURL: https://github.com/goalixa/goalixa-BFF.git
    targetRevision: main
    path: helm
    helm:
      valueFiles:
        - values-production.yaml
      parameters:
        - name: image.tag
          value: latest  # Default, can be overridden by workflow
  destination:
    server: https://kubernetes.default.svc
    namespace: goalixa-bff
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas  # Allow autoscaling to manage replicas
    - group: ""
      kind: Secret
      name: bff-secrets
      jsonPointers:
        - /data  # Allow manual secret management
