# Staging values for goalixa-bff
# Override default values for staging environment

image:
  registry: harbor.goalixa.com
  repository: bff-staging/bff
  tag: "latest"

replicaCount: 1

container:
  port: 8000

namespace:
  name: goalixa-bff-staging

env:
  ENVIRONMENT: "staging"
  DEBUG: "true"
  # Auth Service
  AUTH_SERVICE_URL: "http://auth.goalixa-auth-staging.svc.cluster.local:80"
  AUTH_API_PREFIX: "/api"
  # App Service
  APP_SERVICE_URL: "http://core-api.core-api-staging.svc.cluster.local:80"
  APP_API_PREFIX: "/api"
  # Redis
  REDIS_URL: "redis://redis.redis.svc.cluster.local:6379/0"
  REDIS_ENABLED: "false"
  # Security
  SECURE_COOKIES: "true"
  COOKIE_DOMAIN: ".goalixa.com"
  # Logging
  LOG_LEVEL: "DEBUG"
  # Rate limiting
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_PERIOD: "60"

configMap:
  corsOrigins: '["https://staging.goalixa.com","https://www.staging.goalixa.com"]'
  cacheTtl: "300"

service:
  type: ClusterIP
  port: 8000

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
  hosts:
    - host: staging.goalixa.com
      paths:
        - path: /bff(/|$)(.*)
          pathType: ImplementationSpecific
  tls:
    - secretName: staging-goalixa-bff-tls
      hosts:
        - staging.goalixa.com
