# Staging values for goalixa-bff
# Override default values for staging environment

image:
  registry: harbor.goalixa.com
  repository: bff-staging/bff
  tag: "latest"  # Overridden by GitHub workflow

replicaCount: 1

namespace:
  name: goalixa-bff-staging

env:
  LOG_LEVEL: "DEBUG"
  DEBUG: "true"
  REDIS_ENABLED: "false"
  # Staging service URLs
  AUTH_SERVICE_URL: "http://goalixa-auth.goalixa-auth-staging.svc.cluster.local:80"
  APP_SERVICE_URL: "http://core-api.core-api-staging.svc.cluster.local:80"

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false

env:
  LOG_LEVEL: "DEBUG"
  DEBUG: "true"
  REDIS_ENABLED: "false"
