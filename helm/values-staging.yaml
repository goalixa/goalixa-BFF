# Staging values for goalixa-bff
# Override default values for staging environment

image:
  tag: "latest"  # Overridden by GitHub workflow

replicaCount: 1

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false

env:
  LOG_LEVEL: "DEBUG"
  DEBUG: "true"
  REDIS_ENABLED: "false"
