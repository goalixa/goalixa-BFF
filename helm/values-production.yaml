# Production values for goalixa-bff
# Override default values for production environment

image:
  tag: "latest"  # Overridden by GitHub workflow

replicaCount: 3

namespace:
  name: goalixa-bff

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

env:
  LOG_LEVEL: "WARNING"
  REDIS_ENABLED: "true"
  RATE_LIMIT_REQUESTS: "1000"

# Ingress - Cloudflare handles TLS
ingress:
  enabled: true
  className: nginx
  annotations:
    # Cloudflare handles TLS - disable all SSL redirects
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    # Backend settings
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # Rewrite /bff/path to /path
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://app.goalixa.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
  hosts:
    - host: app.goalixa.com
      paths:
        - path: /bff(/|$)(.*)
          pathType: ImplementationSpecific
  tls:
    - secretName: app-goalixa-tls
      hosts:
        - app.goalixa.com
